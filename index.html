async function api(action, payload = {}, token = null) {
  // Essai 1 : fetch direct (fonctionne si CORS ok)
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
        action,
        token: token || "",
        payload: payload || {}
      })
    });
    const data = await res.json();
    if (data !== undefined) return data;
  } catch (e1) {}

  // Essai 2 : JSONP via balise script (contourne CORS)
  return new Promise(resolve => {
    const cbName = "visilog_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const params = new URLSearchParams({
      action,
      token: token || "",
      payload: JSON.stringify(payload || {}),
      callback: cbName
    });
    const script = document.createElement("script");
    script.type = "text/javascript";
    const timer = setTimeout(() => {
      try {
        if (script.parentNode) script.parentNode.removeChild(script);
      } catch (e) {}
      delete window[cbName];
      resolve({
        ok: false,
        error: "Timeout API"
      });
    }, 25000);
    window[cbName] = data => {
      clearTimeout(timer);
      try {
        if (script.parentNode) script.parentNode.removeChild(script);
      } catch (e) {}
      delete window[cbName];
      resolve(data);
    };
    script.onerror = e => {
      clearTimeout(timer);
      try {
        if (script.parentNode) script.parentNode.removeChild(script);
      } catch (e2) {}
      delete window[cbName];
      // Essai 3 : fetch avec text/plain (parfois Apps Script accepte)
      fetch(API_URL + "?" + params.toString()).then(r => r.text()).then(text => {
        try {
          const match = text.match(/^[^(]+\((.+)\)[\s;]*$/s);
          if (match) resolve(JSON.parse(match[1]));else resolve(JSON.parse(text));
        } catch (e3) {
          resolve({
            ok: false,
            error: "Erreur réseau — " + e3.message
          });
        }
      }).catch(() => resolve({
        ok: false,
        error: "Erreur réseau — impossible de joindre l\'API"
      }));
    };
    script.src = API_URL + "?" + params.toString();
    (document.head || document.body).appendChild(script);
  });
}
async function apiOrLocal(action, payload, token, localKey, fallback) {
  if (token || action === "login") {
    const r = await api(action, payload, token);
    if (r.ok) return r.data !== undefined ? r.data : r;
  }
  return load(localKey, fallback);
}

// ─── MODULE : BULLETINS DE PAIE (Direction - Upload) ─────────
const BulletinsAdmin = ({agents, bulletins, setBulletins, user}) => {
  const {toast, showToast} = useToast();
  const [uploading, setUploading] = useState(false);
  const [selectedAgent, setSelectedAgent] = useState('');
  const [selectedMois, setSelectedMois] = useState('');
  const [selectedAnnee, setSelectedAnnee] = useState(new Date().getFullYear());
  const MOIS_LABELS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const activeAgents = agents.filter(a => a.actif===true||a.actif==='TRUE');

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file || !selectedAgent || !selectedMois) {
      showToast('Sélectionner un agent et un mois', 'error'); return;
    }
    if (file.size > 5 * 1024 * 1024) { showToast('PDF trop lourd (max 5MB)', 'error'); return; }
    setUploading(true);
    try {
      // Convertir en base64
      const base64 = await new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      const periode = `${selectedAnnee}-${String(selectedMois).padStart(2,'0')}`;
      const r = await api('bulletins.upload', {
        agentId: selectedAgent, periode, fileName: file.name, fileBase64: base64
      }, user.token);
      if (r.ok) {
        const newBulletin = { id: r.id, agentId: selectedAgent, periode, driveUrl: r.driveUrl, uploadedBy: user.username, uploadedAt: new Date().toISOString() };
        setBulletins(prev => [newBulletin, ...prev.filter(b => !(b.agentId===selectedAgent && b.periode===periode))]);
        showToast('Bulletin uploadé avec succès');
        setSelectedAgent(''); setSelectedMois('');
      } else {
        showToast('Erreur: ' + (r.error||'Upload échoué'), 'error');
      }
    } catch(err) {
      showToast('Erreur réseau: ' + err.message, 'error');
    } finally {
      setUploading(false);
      e.target.value = '';
    }
  };

  const agentName = id => { const a = agents.find(x=>x.id===id); return a ? `${a.nom} ${a.prenom}` : id; };

    React.createElement('h2', {style:{margin:0,fontSize:16,fontWeight:700,color:'#1E293B'}}, 'Bulletins de Paie'),

    // Formulaire upload
    React.createElement('div', {style:{background:'#fff',borderRadius:10,padding:20,boxShadow:'0 1px 3px #0001',border:'1px solid #E2E8F0'}},
      React.createElement('h3', {style:{margin:'0 0 14px',fontSize:13,fontWeight:700,color:'#1D2C41'}}, '📤 Importer un bulletin'),
      React.createElement('div', {style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}},
        React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:4,flex:2,minWidth:180}},
          React.createElement('label', {style:{fontSize:11,fontWeight:600,color:'#64748B',textTransform:'uppercase'}}, 'Agent'),
          React.createElement('select', {value:selectedAgent, onChange:e=>setSelectedAgent(e.target.value),
            style:{padding:'8px 10px',borderRadius:6,border:'1px solid #CBD5E1',fontSize:13}},
            React.createElement('option', {value:''}, '-- Choisir un agent --'),
            activeAgents.map(a => React.createElement('option',{key:a.id,value:a.id}, `${a.nom} ${a.prenom} (${a.projet})`))
          )
        ),
        React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:4}},
          React.createElement('label', {style:{fontSize:11,fontWeight:600,color:'#64748B',textTransform:'uppercase'}}, 'Mois'),
          React.createElement('select', {value:selectedMois, onChange:e=>setSelectedMois(e.target.value),
            style:{padding:'8px 10px',borderRadius:6,border:'1px solid #CBD5E1',fontSize:13}},
            React.createElement('option', {value:''}, '-- Mois --'),
            MOIS_LABELS.map((m,i) => React.createElement('option',{key:i+1,value:i+1},m))
          )
        ),
        React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:4}},
          React.createElement('label', {style:{fontSize:11,fontWeight:600,color:'#64748B',textTransform:'uppercase'}}, 'Année'),
          React.createElement('select', {value:selectedAnnee, onChange:e=>setSelectedAnnee(parseInt(e.target.value)),
            style:{padding:'8px 10px',borderRadius:6,border:'1px solid #CBD5E1',fontSize:13}},
            [2025,2026,2027].map(y => React.createElement('option',{key:y,value:y},y))
          )
        ),
        React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:4}},
          React.createElement('label', {style:{fontSize:11,fontWeight:600,color:'#64748B',textTransform:'uppercase'}}, 'Fichier PDF'),
          React.createElement('label', {style:{padding:'8px 16px',background:uploading?'#94A3B8':'#D5A563',color:'#fff',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13,whiteSpace:'nowrap'}},
            uploading ? '⟳ Upload...' : '📎 Choisir PDF',

          )

    // Liste des bulletins
    React.createElement('div', {style:{background:'#fff',borderRadius:10,overflow:'hidden',boxShadow:'0 1px 3px #0001'}},
      React.createElement('div', {style:{padding:'12px 16px',borderBottom:'1px solid #E2E8F0',fontWeight:700,fontSize:13}},
        `${bulletins.length} bulletin(s) importé(s)`
      ),
      bulletins.length === 0
        ? React.createElement('div', {style:{padding:40,textAlign:'center',color:'#94A3B8',fontSize:13}}, 'Aucun bulletin importé')
        : React.createElement('div', null,
            bulletins.map(b => React.createElement('div', {key:b.id,
              style:{padding:'12px 16px',borderBottom:'1px solid #F1F5F9',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
              React.createElement('div', null,
                React.createElement('div', {style:{fontWeight:600,fontSize:13}}, agentName(b.agentId)),
                React.createElement('div', {style:{fontSize:11,color:'#64748B'}},
                  `${MOIS_LABELS[parseInt(b.periode.split('-')[1])-1]} ${b.periode.split('-')[0]} · Importé par ${b.uploadedBy}`)

// ─── MODULE : IMPORT POINTAGE (Direction) ────────────────────
const ImportPointage = ({agents, user, onImported}) => {
  const {toast, showToast} = useToast();
  const [importing, setImporting] = useState(false);
  const [loadingMsg, setLoadingMsg] = useState('');
  const [preview, setPreview] = useState(null);
  const [errors, setErrors] = useState([]);

  const MOIS_LABELS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

  const parseExcelDate = (val) => {
    if (!val) return "";
    if (typeof val === 'number') {
      const unixDays2 = Math.floor(val) - 25569;
      const dateObj2 = new Date(unixDays2 * 86400000);
      return dateObj2.getUTCFullYear() + '-' + String(dateObj2.getUTCMonth()+1).padStart(2,'0') + '-' + String(dateObj2.getUTCDate()).padStart(2,'0');
    }
    if (typeof val === 'string') {
      const m = val.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
      if (m) return `${m[3]}-${m[2]}-${m[1]}`;
      return val.slice(0,10);
    }
    const s = String(val).trim();
    // Format DD/MM/YYYY HH:MM ou YYYY-MM-DD
    const m = s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
    if (m) return `${m[3]}-${m[2]}-${m[1]}`;
    const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m2) return `${m2[1]}-${m2[2]}-${m2[3]}`;
    return s.slice(0,10);
  };

  const parseExcelDatetime = (val) => {
    if (!val) return "";
    if (typeof val === 'number') {
      // Nombre série Excel → offset 25569 = 1970-01-01, sans aucune conversion locale
      const unixDays = Math.floor(val) - 25569;
      const timeFraction = val - Math.floor(val);
      const totalMinutes = Math.round(timeFraction * 24 * 60);
      const hh = Math.floor(totalMinutes / 60) % 24;
      const mi = totalMinutes % 60;
      const dateObj = new Date(unixDays * 86400000); // minuit UTC
      const yyyy = dateObj.getUTCFullYear();
      const mm = String(dateObj.getUTCMonth()+1).padStart(2,'0');
      const dd = String(dateObj.getUTCDate()).padStart(2,'0');
      return `${yyyy}-${mm}-${dd}T${String(hh).padStart(2,'0')}:${String(mi).padStart(2,'0')}`;
    }
    if (typeof val === 'string') {
      // Déjà formaté "DD/MM/YYYY HH:MM" ou ISO
      const m = val.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
      if (m) return `${m[3]}-${m[2]}-${m[1]}T${m[4]}:${m[5]}`;
      return val.slice(0,16);
    }
    return String(val).trim();
  };

  const parseDuration = (val) => {
    if (!val) return "00:00"; // pas de pause par défaut
    if (typeof val === 'number') {
      // Fraction de jour Excel ou numéro série avec heure
      // Si val > 1, c'est un datetime: extraire seulement la partie décimale
      const fraction = val > 1 ? val - Math.floor(val) : val;
      const totalMins = Math.round(fraction * 24 * 60);
      if (totalMins === 0) return "00:00";
      return String(Math.floor(totalMins/60)).padStart(2,'0') + ':' + String(totalMins%60).padStart(2,'0');
    }
    const s = String(val).trim();
    const m = s.match(/^(\d+):(\d{2})/);
    if (m) return String(parseInt(m[1])).padStart(2,'0') + ':' + m[2];
    return "00:00";
  };

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    setLoadingMsg('Lecture du fichier Excel...');
    setErrors([]);
    try {
      const XLSX = window.XLSX;
      if (!XLSX) { showToast("Librairie XLSX non chargée", "error"); setImporting(false); return; }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array', cellDates: false, raw: true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
      
      if (rows.length < 2) { showToast("Fichier vide","error"); setImporting(false); return; }
      
      // Détecter les colonnes (case-insensitive)
      const headers = rows[0].map(h => String(h).toLowerCase().trim());
      const col = (name) => headers.findIndex(h => h.includes(name));
      
      const colAgentId = col('agentid') >= 0 ? col('agentid') : col('agent_id') >= 0 ? col('agent_id') : col('id');
      const colNom = col('nom');
      const colPrenom = col('prenom');
      const colEntree = col('entree') >= 0 ? col('entree') : col('entrée') >= 0 ? col('entrée') : col('he');
      const colSortie = col('sortie') >= 0 ? col('sortie') : col('hs');
      const colPause = col('pause');
      
      console.log("Colonnes détectées:", {colAgentId, colNom, colPrenom, colEntree, colSortie, colPause, headers});
      
      const parsed = [];
      const errs = [];
      
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r[colAgentId] && !r[colNom]) continue;
        
        const agentId = String(r[colAgentId] || "").trim();
        const nom = String(r[colNom] || "").trim();
        const prenom = String(r[colPrenom] || "").trim();
        
        // Trouver l'agent
        // Chercher par agentId en priorité (exact), puis par nom/prénom (fallback)
        let agent = agentId ? agents.find(a => a.id === agentId) : null;
        if (!agent && nom) {
          agent = agents.find(a => 
            a.nom.toLowerCase() === nom.toLowerCase() && 
            a.prenom.toLowerCase() === prenom.toLowerCase()
          );
        }
        // Si toujours pas trouvé mais agentId fourni: utiliser nom/prénom du fichier directement
        if (!agent && agentId) {
          agent = { id: agentId, nom: nom, prenom: prenom };
        }
        if (!agent) { errs.push(`L${i+1}: Agent "${nom} ${prenom}" sans agentId`); continue; }
        
        const heEntree = parseExcelDatetime(r[colEntree]);
        const heSortie = parseExcelDatetime(r[colSortie]);
        const pause = parseDuration(colPause >= 0 ? r[colPause] : "00:30");
        
        // Extraire la date depuis heureEntree
        const date = heEntree ? heEntree.slice(0,10) : parseExcelDate(r[colEntree]);
        if (!date) { errs.push(`L${i+1}: Date introuvable`); continue; }
        
        // Calculer HT
        let htMins = 0;
        if (heEntree && heSortie) {
          const t1 = new Date(heEntree.replace(' ','T'));
          const t2 = new Date(heSortie.replace(' ','T'));
          const pauseParts = pause.split(':');
          const pauseMins = parseInt(pauseParts[0])*60 + parseInt(pauseParts[1]||0);
          const diffMins = Math.round((t2-t1)/60000);
          htMins = Math.max(0, diffMins - pauseMins);
        }
        const htStr = String(Math.floor(htMins/60)).padStart(2,'0') + ':' + String(htMins%60).padStart(2,'0');
        
        parsed.push({
          agentId: agent.id, nom: agent.nom, prenom: agent.prenom,
          date, heureEntree: heEntree, heureSortie: heSortie, pause,
          heuresTravaillees: htStr,
          mois: date.slice(0,7),
        });
      }
      
      setErrors(errs);
      setPreview(parsed);
    } catch(err) {
      showToast("Erreur lecture Excel: " + err.message, "error");
      console.error(err);
    } finally {
      setImporting(false);
      e.target.value = '';
    }
  };

  const handleImport = async () => {
    if (!preview?.length) return;
    setImporting(true);
    setLoadingMsg(`Import de ${preview.length} lignes en cours...`);
    const r = await api("pointage.import", {rows: preview}, user.token);
    setImporting(false);
    if (r.ok) {
      showToast(`${r.imported} lignes importées avec succès`);
      setPreview(null);
      if (onImported) onImported();
    } else {
      showToast("Erreur: " + (r.error||"Import échoué"), "error");
    }
  };

  const fmtTime = (s) => {
    if (!s) return '';
    const sep = s.includes('T') ? 'T' : s.includes(' ') ? ' ' : null;
    if (sep) return s.split(sep)[1]?.slice(0,5) || '';
    return s.slice(0,5);
  };

  const moisGroups = preview ? [...new Set(preview.map(r=>r.mois))].sort() : [];

  return React.createElement('div', {style:{display:'flex',flexDirection:'column',gap:12}},
    importing && loadingMsg && React.createElement(LoadingOverlay, {message: loadingMsg, subMessage: 'Merci de ne pas quitter la page'}),
    toast && React.createElement(Toast, {message:toast.message, type:toast.type}),
    
    // Zone import
    React.createElement('div', {style:{background:'#fff',borderRadius:10,padding:20,boxShadow:'0 1px 3px #0001',border:'1px solid #E2E8F0'}},
      React.createElement('h3', {style:{margin:'0 0 12px',fontSize:13,fontWeight:700,color:'#1D2C41'}}, '📥 Importer un fichier de pointage Excel'),
      React.createElement('div', {style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
        React.createElement('label', {style:{padding:'8px 16px',background:importing?'#94A3B8':'#D5A563',color:'#fff',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}},
          importing ? '⟳ Lecture...' : '📎 Choisir fichier Excel (.xlsx)',
          React.createElement('input', {type:'file', accept:'.xlsx,.xls', onChange:handleFile, disabled:importing, style:{display:'none'}})
        ),
        React.createElement('span', {style:{fontSize:11,color:'#94A3B8'}}, 
          'Colonnes requises: agentId, nom, prenom, heureEntree, heureSortie, pause'
        )
      ),
      
      // Erreurs
      errors.length > 0 && React.createElement('div', {style:{marginTop:10,background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:6,padding:'8px 12px'}},
        React.createElement('div', {style:{fontSize:12,fontWeight:700,color:'#DC2626',marginBottom:4}}, `⚠ ${errors.length} ligne(s) ignorée(s):`),
        errors.slice(0,5).map((e,i) => React.createElement('div', {key:i,style:{fontSize:11,color:'#7F1D1D'}}, e))
      )
    ),

    // Prévisualisation
    preview && preview.length > 0 && React.createElement('div', {style:{background:'#fff',borderRadius:10,overflow:'hidden',boxShadow:'0 1px 3px #0001'}},
      React.createElement('div', {style:{padding:'12px 16px',borderBottom:'1px solid #E2E8F0',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
        React.createElement('div', null,
          React.createElement('span', {style:{fontWeight:700,fontSize:13}}), `${preview.length} lignes prêtes à importer`,
          moisGroups.map(m => React.createElement('span', {key:m,style:{marginLeft:8,background:'#EFF6FF',color:'#2563EB',fontSize:11,padding:'2px 8px',borderRadius:10,fontWeight:600}}, 
            m))

    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  })();
  const [moisFilter, setMoisFilter] = useState(defaultMois);
  const [publishing, setPublishing] = useState(false);
  const [loadingMsgGP, setLoadingMsgGP] = useState('');
  const [contestSelected, setContestSelected] = useState(null); // agentId en cours de correction
  const [correctionRows, setCorrectionRows] = useState({});

  useEffect(() => {
    const mois = [...new Set((pointage||[]).map(p=>p.mois).filter(Boolean))].sort().reverse();

      setMoisFilter(mois[0]);

    const r = await api("pointage.get", {}, user.token);
    if (r.ok) setPointage(r.data || []);
  };

  const handleCorrection = async (agentId, agRows) => {
    // Soumettre les corrections et republier
    setPublishing(true);
    setLoadingMsgGP('Correction et republication en cours...');
    const corrected = agRows.map(r => ({
      ...r,
      heuresTravaillees: correctionRows[r.date] !== undefined ? correctionRows[r.date] : r.heuresTravaillees,
    }));
    const r = await api("pointage.import", {rows: corrected.map(r => ({
      agentId: r.agentId, nom: r.nom, prenom: r.prenom,
      date: r.date,
      heureEntree: r.heureEntree,
      heureSortie: r.heureSortie,
      pause: r.pause,
    }))}, user.token);
    if (r.ok) {
      await api("pointage.publier", {mois: moisFilter, agentIds: [agentId]}, user.token);
      showToast("Corrections publiées — l'agent peut re-signer");
      setContestSelected(null);

    setPublishing(false);
    setLoadingMsgGP('');
    await refreshPointage();
  };

  const handlePublier = async () => {
    const toPub = pointage.filter(p => p.mois === moisFilter && p.publie !== "TRUE" && p.publie !== true);
    if (!toPub.length) { showToast("Tout est déjà publié","error"); return; }
    setPublishing(true);
    setLoadingMsgGP('Publication en cours...');
    const r = await api("pointage.publier", {mois: moisFilter}, user.token);
    setPublishing(false);
    setLoadingMsgGP('');
    if (r.ok) {
      showToast(`${r.published} fiches publiées aux agents`);
      await refreshPointage();
    }
  };

  const byAgent = {};
  pointage.filter(p => p.mois === moisFilter).forEach(p => {
    if (!byAgent[p.agentId]) byAgent[p.agentId] = {nom:p.nom,prenom:p.prenom,rows:[],statuts:new Set()};

          publishing ? '⟳ Publication...' : '📢 Publier aux agents'

      ['import','suivi'].map(t => React.createElement('button', {key:t,

const MaFichePointage = ({pointage, user}) => {
  const {toast, showToast} = useToast();
  const availableMoisAgent = [...new Set((pointage||[]).filter(p => p.agentId === (user.agentId||'')).map(p=>p.mois).filter(Boolean))].sort().reverse();
  const defaultMoisAgent = availableMoisAgent.length > 0 ? availableMoisAgent[0] : (() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`;
  })();
  const [moisFilter, setMoisFilter] = useState(defaultMoisAgent);
  useEffect(() => {
    const mois = [...new Set((pointage||[]).map(p=>p.mois).filter(Boolean))].sort().reverse();
    if (mois.length > 0 && !mois.includes(moisFilter)) setMoisFilter(mois[0]);
  }, [pointage]);
  const [showContest, setShowContest] = useState(false);

  // Statut global du mois
  const statuts = [...new Set(myRows.map(r=>r.statut))];

    const p = r.heuresTravaillees||"0:00"; const pts = p.split(':');
