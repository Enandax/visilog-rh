async function api(action, payload = {}, token = null) {
  // Essai 1 : fetch direct (fonctionne si CORS ok)
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain"
      },
      body: JSON.stringify({
        action,
        token: token || "",
        payload: payload || {}
      })
    });
    const data = await res.json();
    if (data !== undefined) return data;
  } catch (e1) {}

  // Essai 2 : JSONP via balise script (contourne CORS)
  return new Promise(resolve => {
    const cbName = "visilog_cb_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    const params = new URLSearchParams({
      action,
      token: token || "",
      payload: JSON.stringify(payload || {}),
      callback: cbName
    });
    const script = document.createElement("script");
    script.type = "text/javascript";
    const timer = setTimeout(() => {
      try {
        if (script.parentNode) script.parentNode.removeChild(script);
      } catch (e) {}
      delete window[cbName];
      resolve({
        ok: false,
        error: "Timeout API"
      });
    }, 25000);
    window[cbName] = data => {
      clearTimeout(timer);
      try {
        if (script.parentNode) script.parentNode.removeChild(script);
      } catch (e) {}
      delete window[cbName];
      resolve(data);
    };
    script.onerror = e => {
      clearTimeout(timer);
      try {
        if (script.parentNode) script.parentNode.removeChild(script);
      } catch (e2) {}
      delete window[cbName];
      // Essai 3 : fetch avec text/plain (parfois Apps Script accepte)
      fetch(API_URL + "?" + params.toString()).then(r => r.text()).then(text => {
        try {
          const match = text.match(/^[^(]+\((.+)\)[\s;]*$/s);
          if (match) resolve(JSON.parse(match[1]));else resolve(JSON.parse(text));
        } catch (e3) {
          resolve({
            ok: false,
            error: "Erreur réseau — " + e3.message
          });
        }
      }).catch(() => resolve({
        ok: false,
        error: "Erreur réseau — impossible de joindre l\'API"
      }));
    };
    script.src = API_URL + "?" + params.toString();
    (document.head || document.body).appendChild(script);
  });
}

  if (token || action === "login") {
    const r = await api(action, payload, token);
    if (r.ok) return r.data !== undefined ? r.data : r;
  }
  return load(localKey, fallback);
}
